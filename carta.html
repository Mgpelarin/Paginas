<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>carta</title>

    <style>

        body {
            background-color: #534227; 
            font-family: "Times New Roman", Times, serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .carta {
            background-color: rgba(255, 255, 255, 0.849); 
            width: 400px; 
            height: 600px;
            padding: 40px; 
            border-radius: 10px;

            box-shadow: 0px 10px 25px rgb(0, 0, 0);
        }

        .titulo {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .assinatura {
            margin-top: 30px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="carta">
        <div class="titulo">
            Convite para festa
        </div>
        <p>
        </p>
        <p>
            Olá, caro colega.
            Aqui está seu convite para participar da nossa festa de fim de ano.
        </p>

    <p>
            Pedimos que traga para o nosso endereço, Rua 2026, numero 7,
            guloseimas, sucos, refrigerantes, etc. para acompanhar a festa e
            para todos aproveitarem o fim de ano.
        </p>
        <div class="assinatura">
            Atenciosamente,<br>
            Eu
        </div>

    </div>

</body>
</html>
